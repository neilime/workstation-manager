---
name: Shared - Continuous Integration

"on":
  workflow_call:

permissions: {}

jobs:
  linter:
    # yamllint disable rule:line-length
    uses: hoverkraft-tech/ci-github-common/.github/workflows/linter.yml@2334d395217f9811699dbd4ace9d8559e4d99e0d # 0.37.3
    # yamllint enable rule:line-length
    with:
      linter-env: |
        ANSIBLE_CONFIG_FILE=.ansible-lint
    permissions:
      actions: read
      contents: read
      security-events: write
      statuses: write

  build-tooling-image:
    # yamllint disable rule:line-length
    uses: hoverkraft-tech/ci-github-container/.github/workflows/docker-build-images.yml@c9088e8447c5a8be45157e17701023fc50ccb1c0 # 0.37.2
    # yamllint enable rule:line-length
    permissions:
      contents: read
      id-token: write
      issues: read
      packages: write
      pull-requests: read
    with:
      oci-registry: ghcr.io
      sign: false
      images: |
        [
          {
            "name": "tooling",
            "context": ".",
            "dockerfile": "./docker/tooling/Dockerfile",
            "platforms": ["linux/amd64"]
          }
        ]
    secrets:
      oci-registry-password: ${{ secrets.GITHUB_TOKEN }}

  static:
    name: Static checks
    runs-on: ubuntu-latest
    needs: [linter, build-tooling-image]
    permissions:
      contents: read
      packages: read
    env:
      TOOLING_IMAGE: >-
        ${{ fromJSON(needs.build-tooling-image.outputs.built-images).tooling.images[0] }}
      TOOLING_IMAGE_PULL: "1"
    steps:
      - name: Checkout
        # yamllint disable rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        # yamllint enable rule:line-length

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup
        run: make setup

      - name: Run Ansible syntax checks
        run: REPORTS_DIR=.reports make check-ansible

      - name: Run Ansible sanity and unit tests
        run: REPORTS_DIR=.reports make test

      - name: Parse static reports
        if: ${{ always() }}
        uses: hoverkraft-tech/ci-github-common/actions/parse-ci-reports@2334d395217f9811699dbd4ace9d8559e4d99e0d # 0.37.3
        with:
          report-paths: .reports/tests/*.xml
          report-name: Static Validation
          path-mapping: /workspace:.

  e2e:
    name: E2E validation
    needs: [static]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        # yamllint disable rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        # yamllint enable rule:line-length

      - name: Set up Lima
        id: lima-setup
        # yamllint disable rule:line-length
        uses: lima-vm/lima-actions/setup@55627e31b78637bf254a8b2a14da8ea7d12564e5 # v1.1.0
        # yamllint enable rule:line-length

      - name: Cache Lima
        # yamllint disable rule:line-length
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        # yamllint enable rule:line-length
        with:
          path: ~/.cache/lima
          key: lima-${{ steps.lima-setup.outputs.version }}

      - name: Start e2e VM
        run: make e2e-up

      - name: Run phased e2e assertions
        env:
          E2E_REPOSITORY_REF: ${{ github.sha }}
          WORKSTATION_MANAGER_GITHUB_TOKEN: ${{ secrets.WORKSTATION_MANAGER_GITHUB_TOKEN }}
          BITWARDEN_CLIENT_ID: ${{ secrets.BITWARDEN_CLIENT_ID }}
          BITWARDEN_CLIENT_SECRET: ${{ secrets.BITWARDEN_CLIENT_SECRET }}
          BITWARDEN_PASSWORD: ${{ secrets.BITWARDEN_PASSWORD }}
        run: REPORTS_DIR=.reports make e2e-test

      - name: Parse e2e reports
        if: ${{ always() }}
        uses: hoverkraft-tech/ci-github-common/actions/parse-ci-reports@2334d395217f9811699dbd4ace9d8559e4d99e0d # 0.37.3
        with:
          report-paths: .reports/tests/e2e-*.junit.xml
          report-name: End-to-End Validation

      - name: Stop e2e VM
        if: ${{ always() }}
        run: make e2e-down
